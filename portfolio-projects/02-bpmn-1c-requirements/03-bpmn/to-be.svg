  <rect x="270" y="250" width="180" height="70" rx="10" fill="#DDEBF7" stroke="#5B9BD5" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="360" y="277">Менеджер регистрирует</tspan><tspan x="360" y="294">заявку в 1С</tspan></text>
  <rect x="270" y="405" width="180" height="70" rx="10" fill="#D9EAD3" stroke="#70AD47" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="360" y="432">1С проверяет</tspan><tspan x="360" y="449">обязательные поля</tspan></text>
  <polygon points="560,395 620,440 560,485 500,440" fill="#F2F2F2" stroke="#1F4E78" stroke-width="2"/><text text-anchor="middle" font-size="12" fill="#1F2933"><tspan x="560" y="440">Данные корректны?</tspan></text>
  <rect x="500" y="115" width="180" height="70" rx="10" fill="#D9EAD3" stroke="#70AD47" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="590" y="142">Вернуть на</tspan><tspan x="590" y="159">дозаполнение</tspan></text>
  <rect x="680" y="405" width="190" height="70" rx="10" fill="#D9EAD3" stroke="#70AD47" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="775" y="432">Создать заявку со</tspan><tspan x="775" y="449">статусом Новая</tspan></text>
  <rect x="920" y="405" width="190" height="70" rx="10" fill="#D9EAD3" stroke="#70AD47" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="1015" y="424">Назначить</tspan><tspan x="1015" y="441">ответственного и</tspan><tspan x="1015" y="458">контрольный срок</tspan></text>
  <rect x="1220" y="250" width="180" height="70" rx="10" fill="#DDEBF7" stroke="#5B9BD5" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="1310" y="277">Менеджер принимает в</tspan><tspan x="1310" y="294">работу</tspan></text>
  <polygon points="1285,545 1350,590 1285,635 1220,590" fill="#F2F2F2" stroke="#1F4E78" stroke-width="2"/><text text-anchor="middle" font-size="12" fill="#1F2933"><tspan x="1285" y="590">Нужно согласование?</tspan></text>
  <rect x="1460" y="555" width="170" height="70" rx="10" fill="#DDEBF7" stroke="#5B9BD5" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="1545" y="582">Руководитель согласует</tspan><tspan x="1545" y="599">в 1С</tspan></text>
  <rect x="1430" y="700" width="180" height="60" rx="10" fill="#DDEBF7" stroke="#5B9BD5" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="1520" y="722">Исполнитель выполняет</tspan><tspan x="1520" y="739">заявку</tspan></text>
  <rect x="1110" y="700" width="210" height="60" rx="10" fill="#D9EAD3" stroke="#70AD47" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="1215" y="722">1С фиксирует закрытие</tspan><tspan x="1215" y="739">и обновляет отчет</tspan></text>
  <ellipse cx="920" cy="730" rx="60" ry="30" fill="#F4CCCC" stroke="#C00000" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="920" y="730">Заявка закрыта</tspan></text>
  <rect x="920" y="535" width="190" height="70" rx="10" fill="#D9EAD3" stroke="#70AD47" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="1015" y="562">Уведомления о новых и</tspan><tspan x="1015" y="579">просроченных заявках</tspan></text>
  <rect x="700" y="535" width="190" height="70" rx="10" fill="#D9EAD3" stroke="#70AD47" stroke-width="2"/><text text-anchor="middle" font-size="13" fill="#1F2933"><tspan x="795" y="554">Отчет руководителя:</tspan><tspan x="795" y="571">статусы, сроки,</tspan><tspan x="795" y="588">ответственные</tspan></text>
